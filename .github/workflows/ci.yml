name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test / Lint / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true

      - name: gofmt
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "Archivos sin gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -timeout 60s -short ./...

      - name: go build
        run: go build -race ./cmd/main.go ./cmd/benchtest

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cbticserver:${{ github.sha }} .
